name: Build and Release Resume

on:
  push:
    branches:
      - master

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-latex-extra texlive-lang-chinese latexmk just

      - name: Build resumes
        run: just all

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ steps.sha.outputs.short }}
          name: Resume ${{ steps.sha.outputs.short }}
          body: |
            Auto-released from commit ${{ github.sha }}
            ${{ github.event.head_commit.message }}
          files: |
            build/resume.pdf
            build/resume-zh_CN.pdf
